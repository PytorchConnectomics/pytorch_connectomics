loss_profiles:
  loss_binary:
    losses:
      - function: WeightedBCEWithLogitsLoss
        weight: 1.0
        kwargs: {reduction: mean}
      - function: DiceLoss
        weight: 1.0
        kwargs: {sigmoid: true, smooth_nr: 1e-5, smooth_dr: 1e-5}
  loss_bcd:
    losses:
      - function: WeightedBCEWithLogitsLoss
        weight: 1.0
        kwargs: {reduction: mean}
        pred_slice: "0:1"
        target_slice: "0:1"
      - function: DiceLoss
        weight: 0.5
        kwargs: {sigmoid: true, smooth_nr: 1e-5, smooth_dr: 1e-5}
        pred_slice: "0:1"
        target_slice: "0:1"
      - function: WeightedBCEWithLogitsLoss
        pos_weight: auto
        weight: 1.0
        kwargs: {reduction: mean}
        pred_slice: "1:2"
        target_slice: "1:2"
      - function: DiceLoss
        weight: 0.5
        kwargs: {sigmoid: true, smooth_nr: 1e-5, smooth_dr: 1e-5}
        pred_slice: "1:2"
        target_slice: "1:2"
      - function: WeightedMSELoss
        weight: 2.0
        kwargs: {tanh: true}
        pred_slice: "2:3"
        target_slice: "2:3"
  loss_per_channel:
    losses:
      - function: PerChannelBCEWithLogitsLoss
        weight: 1.0
        kwargs: {auto_pos_weight: true}
  loss_bd:
    losses:
      - function: WeightedBCEWithLogitsLoss
        weight: 1.0
        pred_slice: "0:-1"
        target_slice: "0:-1"
      - function: DiceLoss
        weight: 1.0
        kwargs: {sigmoid: true, smooth_nr: 1e-5, smooth_dr: 1e-5}
        pred_slice: "0:-1"
        target_slice: "0:-1"
      - function: WeightedMSELoss
        weight: 2.0
        kwargs: {tanh: true}
        pred_slice: "-1:"
        target_slice: "-1:"
