_base_:
  - ../../../../tutorials/neuron_nisb/base_banis_v1_erosion2.yaml

experiment_name: nisb_base_banis_v1_erosion2_sdt
description: >-
  v1+erosion2 with an SDT auxiliary regression head. Output is a flat
  7-channel tensor: 6 affinity channels (BCE) + 1 signed distance
  transform channel (SmoothL1). Inference still uses only the first 3
  short-range affinities for connected-components decoding.

default:
  model:
    out_channels: 7
    loss:
      deep_supervision: false
      losses:
        # Affinity BCE — restricted to channels 0:6 so the SDT channel
        # does not get a binary classification loss.
        - function: PerChannelBCEWithLogitsLoss
          weight: 1.0
          pred_slice: "0:6"
          target_slice: "0:6"
          kwargs:
            auto_pos_weight: true
            max_pos_weight: 10.0
        # SDT regression — only on channel 6.
        - function: SmoothL1Loss
          weight: 10.0
          pred_slice: "6:7"
          target_slice: "6:7"
          kwargs:
            tanh: true
  data:
    label_transform:
      targets:
        # First target: same 6-channel banis affinity as base.
        - name: affinity
          kwargs:
            offsets: ["1-0-0", "0-1-0", "0-0-1", "10-0-0", "0-10-0", "0-0-10"]
            affinity_mode: banis
        # Second target: skeleton-aware EDT, computed on the fly via
        # kimimaro from the instance segmentation.
        - name: skeleton_aware_edt
          kwargs:
            alpha: 0.8
            bg_value: -1.0
  inference:
    model:
      # Decode-time still uses only short-range affinity channels.
      select_channel: [0, 1, 2]

train:
  monitor:
    checkpoint:
      dirpath: outputs/nisb_base_banis_v1_erosion2_sdt/checkpoints/
