tune_profiles:
  # ---------------------------------------------------------------------------
  # BCD (Binary + Contour + Distance) watershed parameter tuning
  # ---------------------------------------------------------------------------
  tune_bcd:
    enabled: true
    load_if_exists: true

    sampler:
      name: TPE
      kwargs:
        n_startup_trials: 15

    optimization:
      mode: single
      single_objective:
        metric: adapted_rand
        direction: minimize

    output:
      save_study: true

    logging:
      verbose: true
      show_progress_bar: true

    parameter_space:
      decoding:
        function_name: decode_instance_binary_contour_distance
        defaults:
          binary_threshold: [0.9, 0.85]
          contour_threshold: [0.8, 1.1]
          distance_threshold: [0.5, -0.5]
          min_instance_size: 30
          min_seed_size: 5
        parameters:
          # binary_threshold is a tuple (seed_thr, fg_thr)
          binary_threshold_seed:
            type: float
            range: [0.7, 0.99]
            step: 0.01
            param_group: binary_threshold
            tuple_index: 0
            description: "Binary mask threshold for seed regions"
          binary_threshold_fg:
            type: float
            range: [0.5, 0.95]
            step: 0.05
            param_group: binary_threshold
            tuple_index: 1
            description: "Binary mask threshold for foreground"
          # contour_threshold is a tuple (low, high)
          contour_threshold_low:
            type: float
            range: [0.3, 0.95]
            step: 0.05
            param_group: contour_threshold
            tuple_index: 0
            description: "Contour threshold (low): voxels below this are interior"
          contour_threshold_high:
            type: float
            range: [0.8, 1.5]
            step: 0.1
            param_group: contour_threshold
            tuple_index: 1
            description: "Contour threshold (high): voxels above this are boundaries"
          # distance_threshold is a tuple (seed_thr, fg_thr)
          distance_threshold_seed:
            type: float
            range: [0.0, 1.0]
            step: 0.1
            param_group: distance_threshold
            tuple_index: 0
            description: "Distance transform threshold for seed regions"
          distance_threshold_fg:
            type: float
            range: [-1.0, 0.5]
            step: 0.1
            param_group: distance_threshold
            tuple_index: 1
            description: "Distance transform threshold for foreground"
          min_instance_size:
            type: int
            range: [10, 200]
            step: 10
            description: "Minimum instance size (voxels) to keep"
          min_seed_size:
            type: int
            range: [1, 30]
            step: 1
            description: "Minimum seed size (voxels) for watershed markers"

  # ---------------------------------------------------------------------------
  # ABISS watershed parameter tuning
  # ---------------------------------------------------------------------------
  tune_abiss:
    enabled: true
    load_if_exists: true

    sampler:
      name: TPE
      kwargs:
        n_startup_trials: 10

    optimization:
      mode: single
      single_objective:
        metric: adapted_rand
        direction: minimize

    output:
      save_study: true

    logging:
      verbose: true
      show_progress_bar: true

    parameter_space:
      decoding:
        function_name: decode_abiss
        defaults:
          command: "{python_exe} scripts/run_abiss_single.py --input {input_h5} --output {output_h5}"
          cli_args:
            ws_high_threshold: 0.80
            ws_low_threshold: 0.01
            ws_size_threshold: 800
            ws_dust_threshold: 600
            ws_merge_threshold: 0.20
        parameters:
          ws_high_threshold:
            type: float
            range: [0.5, 0.9]
            step: 0.1
            nest_under: cli_args
            description: "ABISS Tmax: high watershed threshold"
          ws_low_threshold:
            type: float
            range: [0.01, 0.1]
            step: 0.01
            nest_under: cli_args
            description: "ABISS Tmin: low watershed threshold"
          ws_merge_threshold:
            type: float
            range: [0.1, 0.5]
            step: 0.1
            nest_under: cli_args
            description: "ABISS Tmerge: affinity threshold for size-based merging"
          ws_size_threshold:
            type: int
            range: [100, 2000]
            step: 100
            nest_under: cli_args
            description: "ABISS Tsize: minimum segment size"
          ws_dust_threshold:
            type: int
            range: [100, 1500]
            step: 100
            nest_under: cli_args
            description: "ABISS Tdust: dust removal threshold"
