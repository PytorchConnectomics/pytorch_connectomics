augmentation_profiles:
  aug_basic_geo:
    preset: some
    flip:
      enabled: true
    rotate:
      enabled: true
      spatial_axes: [1, 2]

  aug_basic_app:
    preset: some
    intensity:
      enabled: true
      gaussian_noise_prob: 0.5
      gaussian_noise_std: 0.1
      shift_intensity_prob: 0.5
      shift_intensity_offset: 0.1
      contrast_prob: 0.5
      contrast_range: [0.9, 1.1]

  aug_basic:
    preset: some
    flip:
      enabled: true
    rotate:
      enabled: true
      spatial_axes: [1, 2]
    intensity:
      enabled: true
      gaussian_noise_prob: 0.5
      gaussian_noise_std: 0.1
      shift_intensity_prob: 0.5
      shift_intensity_offset: 0.1
      contrast_prob: 0.5
      contrast_range: [0.9, 1.1]
