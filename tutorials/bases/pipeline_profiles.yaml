pipeline_profiles:
  binary:
    model:
      out_channels: 1
      loss:
        profile: loss_binary
    inference:
      test_time_augmentation:
        activation_profile: act_binary

  bcd:
    model:
      out_channels: 3
      loss:
        profile: loss_bcd
    data:
      label_transform:
        profile: label_bcd
    inference:
      decoding_profile: decoding_bcd
      test_time_augmentation:
        activation_profile: act_bcd

  affinity-12:
    model:
      out_channels: 12
      loss:
        profile: loss_per_channel
    data:
      label_transform:
        profile: label_affinity_12
    inference:
      decoding_profile: decoding_abiss
      test_time_augmentation:
        ensemble_mode: min
        select_channel: [0, 1, 2]
        activation_profile: act_binary
