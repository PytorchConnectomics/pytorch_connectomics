experiment_name: vesicle_xm_mednext_bcd
description: Vesicle segmentation with MedNeXt and multi-task learning (Binary + Contour + DT)

_base_:
  - bases/all_profiles.yaml

default:
  pipeline_profile: bcd
  system:
    profile: all-gpu-cpu  
  model:
    arch:
      profile: mednext_s
    input_size: [32, 128, 128]
    output_size: [32, 128, 128]
  data:
    dataloader:
      profile: cached      
      batch_size: 4
      patch_size: [32, 128, 128]      
    image_transform:
      normalize: "0-1"
    augmentation:
      profile: aug_light
  inference:
    sliding_window:
      window_size: [32, 128, 128]
    evaluation:
      metrics:
        - adapted_rand

train:
  model:
    loss:
      deep_supervision: false
  data:
    train:
      path: "/projects/weilab/dataset/xiaomeng/vesicle/"
      image: ["datasets/bouton-lv/train/vol0_im.h5", "datasets/hydra-lv/vol*_im.h5"]
      label: ["datasets/bouton-lv/train/vol0_lv.h5", "datasets/hydra-lv/vol*_vesicle_ins.h5"]
      mask: ["datasets/bouton-lv/train/vol0_mask.h5", "datasets/hydra-lv/vol*_mask.h5"]
      resolution: [30, 8, 8]
    # make sure samples have enough foreground for masked sampling
    dataloader:
      cached_sampling_foreground_threshold: 0.05
      cached_sampling_sample_nonzero_mask: true
  optimization:
    profile: warmup_cosine_lr
    n_steps_per_epoch: 1000
    max_epochs: 500
    
  monitor:
    logging:
      scalar:
        loss_every_n_steps: 50
      images:
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
    checkpoint:
      save_top_k: 3
      monitor: train_loss_total_epoch

test:
  data:
    test:
      path: "/projects/weilab/dataset/xiaomeng/vesicle/"
      image: "im/Bouton_100_EM.tif"
      mask: "mask/Bouton_100_em_mask.tif"
      resolution: [30, 8, 8]
    # fix: the exported mask is 2x downsampled, so we need to upsample it to the original size
    data_transform:
      resize: [1, 2, 2]
      align_to_image: true
      binarize: true
