_base_:
  - common.yaml

experiment_name: mitoem30h_mednext_sdt_multitask

train:
  monitor:
    checkpoint:
      dirpath: outputs/mitoem30h_mednext_sdt_multitask/checkpoints/
  data:
    train:
      image: [EM30-H/im_train.h5]
      label: [EM30-H/mito_train-v2.h5]
      label_aux_type: skeleton
    val:
      image: [EM30-H/im_val.h5]
      label: [EM30-H/mito_val-v2.h5]
