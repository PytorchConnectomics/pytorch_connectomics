_base_:
  - ../../connectomics/config/all_profiles.yaml

description: MitoEM 3D mitochondria instance segmentation with MedNeXt multi-head (aff_r1 + aff_r5 + sdt)

default:
  system:
    num_gpus: -1
    num_workers: -1
  model:
    arch:
      type: mednext
    mednext:
      size: M
      kernel_size: 3
      checkpoint_style: outside_block
    input_size: [32, 256, 256]
    output_size: [32, 256, 256]
    out_channels: 7
    primary_head: aff_r1
    heads:
      aff_r1:
        out_channels: 3
        num_blocks: 1
        hidden_channels: 8
        target_slice: "0:3"
      aff_r5:
        out_channels: 3
        num_blocks: 1
        hidden_channels: 8
        target_slice: "3:6"
      sdt:
        out_channels: 1
        num_blocks: 1
        hidden_channels: 8
        target_slice: "6:7"
    loss:
      losses:
        - function: PerChannelBCEWithLogitsLoss
          weight: 1.0
          pred_head: aff_r1
          target_slice: "0:3"
          kwargs: {auto_pos_weight: true}
        - function: PerChannelBCEWithLogitsLoss
          weight: 1.0
          pred_head: aff_r5
          target_slice: "3:6"
          kwargs: {auto_pos_weight: true}
        - function: SmoothL1Loss
          weight: 10.0
          pred_head: sdt
          target_slice: "6:7"
          kwargs: {tanh: true}
      loss_balancing:
        strategy: uncertainty
  data:
    image_transform:
      normalize: "divide-255"
    label_transform:
      resolution: [30, 8, 8]
      erosion: 1
      # Keep precomputed skeleton caches beside each label file.
      # EM30-H and EM30-R share basenames, so a single shared cache_dir would collide.
      targets:
        - name: affinity
          kwargs:
            offsets: ["0-0-1", "0-1-0", "1-0-0", "0-0-5", "0-5-0", "5-0-0"]
            affinity_mode: deepem
        - name: skeleton_aware_edt
          kwargs:
            alpha: 0.8
            bg_value: -1.0
    dataloader:
      patch_size: [32, 256, 256]
      batch_size: 1
      cached_sampling_foreground_threshold: 0.02
      cached_sampling_max_attempts: 50
    augmentation:
      profile: aug_em_neuron_fast
      rotate:
        enabled: true
        spatial_axes: [0, 1, 2]
  inference:
    head: aff_r1
    sliding_window:
      window_size: [32, 256, 256]
      sw_batch_size: 1
      overlap: 0.5
      blending: gaussian
      sigma_scale: 0.25
      padding_mode: replicate
      keep_input_on_cpu: false
    test_time_augmentation:
      enabled: false
      flip_axes: all
      ensemble_mode: min
      channel_activations:
        - {channels: ":", activation: sigmoid}
    save_prediction:
      enabled: true
      intensity_scale: -1
      intensity_dtype: float32
    decoding:
      - name: decode_distance_watershed
        kwargs:
          distance_channels: [6]
          distance_threshold: [0.5, 0]
          min_seed_size: 100
          min_instance_size: 50
          use_fast_edt: true
          edt_parallel: 8
    evaluation:
      enabled: true
      metrics: [adapted_rand, voi]

train:
  system:
    seed: 42
  optimization:
    profile: warmup_cosine_lr
    max_epochs: 200
    n_steps_per_epoch: 1000
    accumulate_grad_batches: 4
    precision: "bf16-mixed"
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, val_loss_total, train_loss_term_0_weighted, train_loss_term_1_weighted, train_loss_term_2_weighted]
        loss_every_n_steps: 50
      images:
        head: aff_r1
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
        channel_mode: all
    checkpoint:
      save_top_k: 3
      monitor: val_loss_total
      mode: min
  data:
    root_path: /projects/weilab/dataset/mito/mitoEM

test:
  data:
    root_path: /projects/weilab/dataset/mito/mitoEM
    test:
      resolution: [30, 8, 8]
