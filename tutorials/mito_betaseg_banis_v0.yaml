_base_:
- ../connectomics/config/all_profiles.yaml

experiment_name: mito_betaseg_banis_v0
description: BANIS-mito reproduction target (16nm betaSeg, 6-channel affinity + 1-channel SDT,
  MedNeXt-S/k3, 128-cube, 50k steps; mirrors lib/banis mito branch justfile train_betaseg)

default:
  system:
    num_gpus: -1
    num_workers: -1
  model:
    arch:
      type: mednext
    input_size: [128, 128, 128]
    output_size: [128, 128, 128]
    in_channels: 1
    out_channels: 7
    # BANIS uses create_mednext_v1(num_classes=7), one final 32->7 conv.
    # Multi-head with num_blocks: 0 gives independent 32->{6,1} projections,
    # mathematically equivalent (parameters partitioned, no sharing).
    primary_head: aff
    heads:
      aff:
        out_channels: 6
        num_blocks: 0
        target_slice: "0:6"
      sdt:
        out_channels: 1
        num_blocks: 0
        target_slice: "6:7"
    loss:
      deep_supervision: false
      losses:
      # BANIS: binary_cross_entropy_with_logits over all 6 affinity channels,
      # no per-channel pos_weight, no Dice. WeightedBCEWithLogitsLoss without
      # pos_weight is plain BCE.
      - function: WeightedBCEWithLogitsLoss
        weight: 1.0
        pred_head: aff
        target_slice: "0:6"
      # BANIS: mse_loss(tanh(pred), sdt_target), sdt_loss_weight = 1.0.
      - function: WeightedMSELoss
        weight: 1.0
        pred_head: sdt
        target_slice: "6:7"
        kwargs: {tanh: true}
    mednext:
      size: S
      kernel_size: 3
      dim: 3d
      checkpoint_style: outside_block
  data:
    dataloader:
      patch_size: [128, 128, 128]
      # BANIS reads small_size + long_range, computes affinities, then crops
      # back to small_size so long-range edges have valid context.
      target_context: [10, 10, 10]
      # BANIS-mito justfile uses --batch_size 8 --devices=1 (global batch = 8).
      # On 4 GPUs (DDP), per-GPU batch_size=2 reproduces the same global batch.
      batch_size: 2
      val_random_sampling: true
      cached_sampling_foreground_threshold: 0.05
      cached_sampling_max_attempts: 50
      cached_sampling_sample_nonzero_mask: true
    image_transform:
      normalize: "divide-255"
    label_transform:
      # BANIS comp_affinities runs on the raw (per-patch CC-relabeled)
      # segmentation: no erosion, source-index storage (affinity_mode=banis).
      erosion: 0
      relabel_connected_components: true
      relabel_connectivity: 6
      resolution: [16, 16, 16]
      cache_dir: datasets/betaSeg
      targets:
      - name: affinity
        kwargs:
          # 3 short-range + 3 long-range@10. Watershed decoding uses the first
          # 3 channels in axis0/axis1/axis2 order as foreground.
          offsets: ["1-0-0", "0-1-0", "0-0-1", "10-0-0", "0-10-0", "0-0-10"]
          affinity_mode: banis
      # SDT defaults match BANIS (alpha=0.8, bg_value=-1.0).
      - name: skeleton_aware_edt
        kwargs:
          alpha: 0.8
          bg_value: -1.0
    augmentation:
      profile: aug_banis
  inference:
    execution:
      strategy: whole_volume
    model:
      # Merge both heads so TTA channel_activations address the concatenated
      # 7-channel output (aff[0:6] + sdt[6:7]).
      head: "aff,sdt"
      # Keep the full aff+sdt tensor so binary+distance watershed can use
      # affinity foreground channels plus SDT channel 6.
      channel_activations:
      # BANIS: scale_sigmoid(x) = sigmoid(0.2 * x) on aff; tanh on SDT.
      - {channels: "0:6", activation: scale_sigmoid}
      - {channels: "6:7", activation: tanh}
    window:
      window_size: [128, 128, 128]
      sw_batch_size: 1
      overlap: 0.5
      blending: bump
      padding_mode: replicate
      keep_input_on_cpu: false
    test_time_augmentation:
      enabled: false
    save_results: true
    save_dtype: float16
    save_backend: h5

  decoding:
    steps:
    - name: decode_binary_contour_distance_watershed
      kwargs:
        binary_channels: [0, 1, 2]
        binary_channel_reduction: min
        contour_channels:
        distance_channels: [6]
        binary_threshold:
        - 0.9
        - 0.85
        contour_threshold:
        distance_threshold:
        - 0.5
        - -0.5
        min_instance_size: 100
        min_seed_size: 20
        prediction_scale: 1

  evaluation:
    enabled: true
    metrics: [adapted_rand]

train:
  system:
    seed: 0
  optimization:
    optimizer:
      name: AdamW
      lr: 0.001
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1.0e-8
    scheduler:
      name: CosineAnnealingLR
      interval: step
      frequency: 1
      min_lr: 0.0
      params:
        # BANIS-mito: T_max = n_steps = 50000.
        t_max: 50000
    max_epochs: 50
    max_steps: 50000
    n_steps_per_epoch: 5000
    val_check_interval: 5000
    val_check_interval_unit: step
    # BANIS uses limit_val_batches=100.
    val_steps_per_epoch: 100
    gradient_clip_val: 1.0
    accumulate_grad_batches: 1
    precision: "16-mixed"
    log_every_n_steps: 100
    num_sanity_val_steps: 0
    ema:
      enabled: false
  data:
    root_path: /projects/weilab/liupeng/data/raw/mito/betaSeg
    train:
      image: [high_c3_im.tiff, low_c1_im.tiff, low_c2_im.tiff]
      label: [high_c3_mito.tiff, low_c1_mito.tiff, low_c2_mito.tiff]
      label_aux_type: skeleton
    val:
      image: [high_c1_im.tiff]
      label: [high_c1_mito.tiff]
      label_aux_type: skeleton
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, val_loss_total]
        loss_every_n_steps: 100
      images:
        max_images: 8
        num_slices: 2
        log_every_n_epochs: 1
        channel_mode: all
    checkpoint:
      monitor: val_loss_total
      mode: min
      save_top_k: 3
      save_every_n_steps: 10000
      save_on_train_epoch_end: false
      save_last: true
      checkpoint_filename: "{epoch:03d}-{val_loss_total:.4f}"
      save_path: outputs/mito_betaseg_banis_v0

test:
  data:
    root_path: /projects/weilab/liupeng/data/raw/mito/betaSeg
    test:
      path: ""
      # BANIS-mito test split: high_c2, high_c4, low_c3.
      image: [high_c2_im.tiff, high_c4_im.tiff, low_c3_im.tiff]
      label: [high_c2_mito.tiff, high_c4_mito.tiff, low_c3_mito.tiff]
      label_aux_type: skeleton
      resolution: [16, 16, 16]
    data_transform:
      pad_size: [64, 64, 64]
