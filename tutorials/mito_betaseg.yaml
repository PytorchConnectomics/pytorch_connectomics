_base_:
  - ../connectomics/config/all_profiles.yaml

experiment_name: mednext_betaseg_sdt_multitask
description: BetaSeg 3D mitochondria instance segmentation with MedNeXt multi-head (aff_r1 + aff_r5 + sdt)

default:
  system:
    num_gpus: -1
    num_workers: -1
  model:
    arch:
      type: mednext
    mednext:
      size: S
      kernel_size: 3
      checkpoint_style: outside_block

    input_size: [192, 192, 192]
    output_size: [192, 192, 192]
    out_channels: 7
    primary_head: aff_r1
    heads:
      aff_r1:
        out_channels: 3
        num_blocks: 2
        hidden_channels: 16
        target_slice: "0:3"
      aff_r5:
        out_channels: 3
        num_blocks: 2
        hidden_channels: 16
        target_slice: "3:6"
      sdt:
        out_channels: 1
        num_blocks: 2
        hidden_channels: 16
        target_slice: "6:7"
    loss:
      losses:
        - function: PerChannelBCEWithLogitsLoss
          weight: 1.0
          pred_head: aff_r1
          target_slice: "0:3"
          kwargs: {auto_pos_weight: true, max_pos_weight: 50.0}
        - function: DiceLoss
          weight: 1.0
          pred_head: aff_r1
          target_slice: "0:3"
          kwargs: {sigmoid: true}
        - function: PerChannelBCEWithLogitsLoss
          weight: 1.0
          pred_head: aff_r5
          target_slice: "3:6"
          kwargs: {auto_pos_weight: true, max_pos_weight: 100.0}
        - function: DiceLoss
          weight: 1.0
          pred_head: aff_r5
          target_slice: "3:6"
          kwargs: {sigmoid: true}
        - function: SmoothL1Loss
          weight: 10.0
          pred_head: sdt
          target_slice: "6:7"
          kwargs: {tanh: true}
      loss_balancing:
        strategy: gradnorm
  data:
    image_transform:
      normalize: "divide-255"
    label_transform:
      resolution: [16, 16, 16]
      erosion: 1
      cache_dir: datasets/betaSeg
      targets:
        - name: affinity
          kwargs:
            offsets: ["0-0-1", "0-1-0", "1-0-0", "0-0-5", "0-5-0", "5-0-0"]
            affinity_mode: deepem
        - name: skeleton_aware_edt
          kwargs:
            alpha: 0.8
            bg_value: -1.0
    dataloader:
      patch_size: [192, 192, 192]
      batch_size: 1
      cached_sampling_foreground_threshold: 0.02
      cached_sampling_max_attempts: 50
    augmentation:
      profile: aug_em_neuron_fast
      rotate:
        enabled: true
        spatial_axes: [0, 1, 2]
  inference:
    head: "aff_r1,aff_r5,sdt"
    sliding_window:
      window_size: [192, 192, 192]
      sw_batch_size: 1
      keep_input_on_cpu: false
    test_time_augmentation:
      enabled: false
      flip_axes: all
      ensemble_mode: min
      channel_activations:
        - {channels: "0:6", activation: sigmoid}
        - {channels: "6:7", activation: tanh}
    crop_pad: [59, 64, 59, 64, 59, 64]
    postprocessing:
      enabled: true
    decoding:
      - name: decode_distance_watershed
        kwargs:
          distance_channels: [6]
          distance_threshold: [0.5, 0]
          min_seed_size: 100
          min_instance_size: 50
          use_fast_edt: true
          edt_parallel: 8
    save_prediction:
      enabled: true
    evaluation:
      enabled: true
      metrics: [adapted_rand]

train:
  optimization:
    profile: warmup_cosine_lr
    max_epochs: 200
    n_steps_per_epoch: 1000
    accumulate_grad_batches: 4
    precision: "bf16-mixed"
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, train_loss_term_0_weighted, train_loss_term_1_weighted, train_loss_term_2_weighted]
        loss_every_n_steps: 50
      images:
        head: all
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
        channel_mode: all
    checkpoint:
      save_top_k: 3
      monitor: val_loss_total
      mode: min
  data:
    root_path: /projects/weilab/liupeng/data/raw/mito/betaSeg
    train:
      image: [high_c3_im.tiff, low_c1_im.tiff, low_c2_im.tiff]
      label: [high_c3_mito.tiff, low_c1_mito.tiff, low_c2_mito.tiff]
      label_aux_type: skeleton
    val:
      image: [high_c1_im.tiff]
      label: [high_c1_mito.tiff]
      label_aux_type: skeleton

test:
  data:
    root_path: /projects/weilab/liupeng/data/raw/mito/betaSeg
    test:
      path: ""
      image: high_c2_im.tiff
      label: high_c2_mito.tiff
      # Matches sdt_path_for_label(..., mode="skeleton", cache_dir="datasets/betaSeg")
      # so pure test mode can consume the precomputed skeleton cache directly.
      label_aux: datasets/betaSeg/high_c2_mito_skeleton.h5
      label_aux_type: skeleton
      resolution: [16, 16, 16]
    data_transform:
      pad_size: [64, 64, 64]
