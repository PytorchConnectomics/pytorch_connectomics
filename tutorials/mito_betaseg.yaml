experiment_name: mednext_betaseg_sdt_multitask
description: BetaSeg 3D mitochondria instance segmentation with MedNeXt multi-head (aff_r1 + aff_r5 + sdt)

_base_:
  - ../connectomics/config/all_profiles.yaml

default:
  pipeline_profile: aff9_sdt
  system:
    profile: all-gpu-cpu
  model:
    arch:
      profile: mednext_s
    input_size: [128, 128, 128]
    output_size: [128, 128, 128]
    primary_head: aff_r1
    heads:
      aff_r1:
        out_channels: 3
        num_blocks: 1
        hidden_channels: 8
        target_slice: "0:3"
      aff_r5:
        out_channels: 3
        num_blocks: 1
        hidden_channels: 8
        target_slice: "3:6"
      sdt:
        out_channels: 1
        num_blocks: 1
        hidden_channels: 8
        target_slice: "6:7"
    loss:
      losses:
        - function: PerChannelBCEWithLogitsLoss
          weight: 1.0
          pred_head: aff_r1
          target_slice: "0:3"
          kwargs: {auto_pos_weight: true}
        - function: PerChannelBCEWithLogitsLoss
          weight: 1.0
          pred_head: aff_r5
          target_slice: "3:6"
          kwargs: {auto_pos_weight: true}
        - function: SmoothL1Loss
          weight: 1.0
          pred_head: sdt
          target_slice: "6:7"
          kwargs: {tanh: true}
      loss_balancing:
        strategy: uncertainty
  data:
    label_transform:
      resolution: [16, 16, 16]
      targets:
        - name: affinity
          kwargs:
            offsets: ["0-0-1", "0-1-0", "1-0-0", "0-0-5", "0-5-0", "5-0-0"]
            deepem_crop: true
        - name: skeleton_aware_edt
          kwargs:
            alpha: 0.8
            bg_value: -1.0
    dataloader:
      patch_size: [128, 128, 128]
      batch_size: 2
      use_lazy_zarr: true
    image_transform:
      normalize: "divide-255"
    augmentation:
      profile: aug_em_neuron
      rotate:
        spatial_axes: [0, 1, 2]
  inference:
    head: aff_r1
    sliding_window:
      window_size: [128, 128, 128]
      sw_batch_size: 1
      keep_input_on_cpu: false
    test_time_augmentation:
      enabled: false
      flip_axes: all
      ensemble_mode: min
      channel_activations:
        - {channels: ":", activation: sigmoid}
    postprocessing:
      enabled: true
      crop_pad: [59, 64, 59, 64, 59, 64]
    save_prediction:
      enabled: true
    evaluation:
      enabled: true
      metrics: [adapted_rand]


train:
  data:
    root_path: /projects/weilab/liupeng/projects/banis/data/mito_data/betaSeg
    train:
      path: train
      image: [high_c3/data.zarr/img, low_c1/data.zarr/img, low_c2/data.zarr/img]
      label: [high_c3/data.zarr/seg, low_c1/data.zarr/seg, low_c2/data.zarr/seg]
      label_aux_type: skeleton
    val:
      path: val
      image: high_c1/data.zarr/img
      label: high_c1/data.zarr/seg
      label_aux_type: skeleton

  optimization:
    profile: warmup_cosine_lr
    max_epochs: 200
    n_steps_per_epoch: 1000
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, train_loss_term_0_weighted, train_loss_term_1_weighted, train_loss_term_2_weighted]
        loss_every_n_steps: 50
      images:
        head: aff_r1
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
        channel_mode: all
    checkpoint:
      save_top_k: 3
      monitor: val_loss_total
      mode: min

test:
  data:
    test:
      path: test
      image: high_c2/data.zarr/img
      label: high_c2/data.zarr/seg
      label_aux_type: skeleton
      resolution: [16, 16, 16]
    data_transform:
      pad_size: [64, 64, 64]
  inference:
    head: aff_r1
    decoding:
      - name: decode_distance_watershed
        kwargs:
          distance_channels: [6]
          distance_threshold: [0.5, 0]
          min_seed_size: 100
          min_instance_size: 50
          use_fast_edt: true
          edt_parallel: 8
