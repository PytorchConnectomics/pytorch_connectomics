experiment_name: nisb_base_banis_waterz_large_decode
description: >
  Chunked large-volume waterz decoding for whole NISB BANIS affinities.

  This workflow is consumed by the `waterz_decode_large` console script
  (installed via `pip install -e lib/waterz/`), not scripts/main.py.
  Generate or point affinity_path at a whole-volume raw affinity H5 from
  tutorials/neuron_nisb/base_banis.yaml or base_banis_chunk.yaml first.

  Usage:
    waterz_decode_large --config tutorials/neuron_nisb/base_banis_waterz_large_decode.yaml --init-only
    waterz_decode_large --config tutorials/neuron_nisb/base_banis_waterz_large_decode.yaml --sbatch
    waterz_decode_large --config tutorials/neuron_nisb/base_banis_waterz_large_decode.yaml --wait --assemble

large_decode:
  # Input affinity file (HDF5 dataset "main", shape Cx3000x3000x1350 for whole NISB).
  # Set this to the raw_x1_ch0-1-2.h5 emitted by the base BANIS test run.
  affinity_path: outputs/nisb_base_banis/20260427_095218/test_step=00200000/seed101/raw_x1_ch0-1-2.h5
  affinity_dataset: main

  # Shared workflow directory for chunk task state and final assembly.
  workflow_root: outputs/nisb_base_banis_waterz_large_decode/seed101_step=00200000

  # Chunk layout follows the affinity H5 spatial axis order. PyTC's NISB raw
  # affinity H5 keeps the source zarr order, so this is 3 x 3 x 5 chunks over
  # a 3000 x 3000 x 1350 volume. The overlap path uses consensus stitching
  # and global region-graph agglomeration.
  chunk_shape: [1000, 1000, 270]
  overlap: [64, 64, 32]

  # Waterz parameters from base_banis_crop_waterz.yaml.
  thresholds: [0.5]
  merge_function: aff85_his256
  aff_threshold_low: 0.3
  aff_threshold_high: 0.999
  channel_order: zyx
  use_aff_uint8: true
  use_seg_uint32: true

  # Dust merge / cleanup.
  dust_merge: true
  dust_merge_size: 800
  dust_merge_affinity: 0.3
  dust_remove_size: 600

  # Boundary stitching / overlap merge parameters.
  min_overlap: 10
  iou_threshold: 0.0
  one_sided_threshold: 0.8
  one_sided_min_size: 100
  affinity_threshold: 0.0

  # Execution.
  backend: multiprocess
  num_workers: 1
  slurm:
    partition: medium
    mem: 150G
    cpus_per_task: 1
    time: "24:00:00"

  # Output.
  write_output: true
  output_path: outputs/nisb_base_banis_waterz_large_decode/seed101_step=00200000/assembled.h5
  compression: gzip
  compression_level: 4
