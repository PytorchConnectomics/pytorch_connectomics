_base_:
  - base_banis_v1.yaml

experiment_name: nisb_base_banis_v3_erosion2
description: >-
  v3 training setup: v1 loss/EMA plus label erosion=2, using MedNeXt-L/k3
  for higher-capacity affinity prediction.

save_path: outputs/nisb_base_banis_v3_erosion2

default:
  model:
    arch:
      profile: mednext_l
    mednext:
      size: L
      kernel_size: 3
  data:
    dataloader:
      batch_size: 2
    label_transform:
      erosion: 2

