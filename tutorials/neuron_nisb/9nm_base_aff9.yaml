_base_:
  - ../../connectomics/config/all_profiles.yaml

experiment_name: neuron_nisb_9nm_base_mednext_l_aff9_multitask
description: NISB base neuron instance segmentation (BANIS-style) with MedNeXt-L multi-head outputs (aff_r1 + aff_r5 + aff_r11, 9nm)

default:
  model:
    arch:
      profile: mednext_l
    input_size: [32, 256, 256]
    output_size: [32, 256, 256]
    in_channels: 1
    out_channels: 9
    primary_head: aff_r1
    heads:
      aff_r1:
        out_channels: 3
        num_blocks: 1
        hidden_channels: 16
        target_slice: "0:3"
      aff_r5:
        out_channels: 3
        num_blocks: 1
        hidden_channels: 16
        target_slice: "3:6"
      aff_r11:
        out_channels: 3
        num_blocks: 1
        hidden_channels: 16
        target_slice: "6:9"
    loss:
      deep_supervision: false
      losses:
      - function: PerChannelBCEWithLogitsLoss
        weight: 1.0
        pred_head: aff_r1
        target_slice: "0:3"
        kwargs: {auto_pos_weight: true}
      - function: PerChannelBCEWithLogitsLoss
        weight: 1.0
        pred_head: aff_r5
        target_slice: "3:6"
        kwargs: {auto_pos_weight: true}
      - function: PerChannelBCEWithLogitsLoss
        weight: 1.0
        pred_head: aff_r11
        target_slice: "6:9"
        kwargs: {auto_pos_weight: true}
      loss_balancing:
        strategy: uncertainty
    mednext:
      size: L
      kernel_size: 3
      dim: 3d
      checkpoint_style: outside_block
  data:
    # BANIS command mapping:
    # --base_data_path /projects/weilab/dataset/nisb
    # --data_setting base
    # NISB zarr arrays are stored as XYZ; model/data pipeline expects ZYX.
    dataloader:
      batch_size: 1
      use_preloaded_cache_train: false
      use_preloaded_cache_val: false
      use_lazy_zarr: true
      use_cache: false
      persistent_workers: true
      patch_size: [32, 256, 256]
    image_transform:
      normalize: "0-1"
      clip_percentile_low: 0.0
      clip_percentile_high: 1.0
    label_transform:
      targets:
      - name: affinity
        kwargs:
          offsets: ["1-0-0", "0-1-0", "0-0-1", "5-0-0", "0-5-0", "0-0-5", "11-0-0", "0-11-0", "0-0-11"]
          deepem_crop: true
    augmentation:
      profile: aug_em_neuron
    data_transform:
      train_transpose: [2, 1, 0]
      val_transpose: [2, 1, 0]
  inference:
    head: aff_r1
    system:
      num_gpus: 1
      num_workers: 8
    sliding_window:
      keep_input_on_cpu: true
      sw_device: cuda
      output_device: cpu
      window_size: [32, 256, 256]
      sw_batch_size: 1
      overlap: 0.5
      blending: gaussian
      sigma_scale: 0.25
      padding_mode: replicate
    test_time_augmentation:
      enabled: false
      flip_axes:
      rotation90_axes:
      channel_activations:
        - {channels: ":", activation: sigmoid}
      select_channel: ":"
      ensemble_mode: mean
      apply_mask: false
    save_prediction:
      enabled: true
      intensity_scale: -1.0
      intensity_dtype: float32
      output_formats: [h5]
    decoding:
    - name: decode_affinity_cc
      kwargs:
        threshold: 0.5

train:
  system:
    num_gpus: -1
    num_workers: -1
    seed: 42
  optimization:
    max_epochs: 500
    n_steps_per_epoch: 200
    gradient_clip_val: 1.0
    accumulate_grad_batches: 2
    precision: "16-mixed"
    log_every_n_steps: 100
    val_check_interval: 1
    num_sanity_val_steps: 0
    optimizer:
      name: AdamW
      lr: 3.0e-4
      weight_decay: 1.0e-2
      betas: [0.9, 0.999]
      eps: 1.0e-8
    scheduler:
      name: WarmupCosineLR
      interval: epoch
      frequency: 1
      warmup_epochs: 3
      warmup_start_lr: 1.0e-5
      min_lr: 1.0e-6
      params:
        max_iter: 500
        warmup_epochs: 3
        warmup_start_lr: 1.0e-5
        min_lr: 1.0e-6
    ema:
      enabled: true
      decay: 0.999
      warmup_steps: 500
      validate_with_ema: true
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, val_loss_total, train_loss_term_0_weighted, train_loss_term_1_weighted, train_loss_term_2_weighted]
        loss_every_n_steps: 100
      images:
        enabled: true
        head: all
        max_images: 8
        num_slices: 4
        log_every_n_epochs: 10
        channel_mode: all
    checkpoint:
      monitor: val_loss_total
      mode: min
      save_top_k: 10
      save_last: true
      save_every_n_epochs: 1
      dirpath: outputs/neuron_nisb_9nm_base_mednext_l_aff9_multitask/checkpoints/
      use_timestamp: true
    early_stopping:
      enabled: false
  data:
    train:
      path: /projects/weilab/dataset/nisb/base/train
      image: seed*/data.zarr/img
      label: seed*/data.zarr/seg
      resolution: [20, 9, 9]
    val:
      path: /projects/weilab/dataset/nisb/base/val
      image: seed*/data.zarr/img
      label: seed*/data.zarr/seg
      resolution: [20, 9, 9]

test:
  output_path: outputs/neuron_nisb_9nm_base_mednext_l_aff9_multitask/results/
  data:
    test:
      image: /projects/weilab/dataset/nisb/base/test/seed*/data.zarr/img
      label: /projects/weilab/dataset/nisb/base/test/seed*/data.zarr/seg
      resolution: [20, 9, 9]
  inference:
    evaluation:
      enabled: true
      metrics:
      - adapted_rand
