_base_:
  - base_banis.yaml

experiment_name: nisb_base_banis_waterz
description: BANIS train_base_long reproduction with waterz decoding
  (waterz parameters borrowed from tutorials/neuron_snemi/neuron_snemi.yaml)

save_path: outputs/nisb_base_banis_waterz

default:
  decoding:
    steps:
    - template: decoding_waterz
      kwargs:
        thresholds: 0.5
        merge_function: aff85_his256
        aff_threshold: [0.1, 0.999]
        # affinity_mode=banis stores edges at the source voxel; waterz expects
        # destination-stored. edge_offset=0 triggers a +1 roll per channel
        # to convert BANIS -> waterz convention.
        edge_offset: 0
        # NISB volumes are stored XYZ; waterz expects ZYX. The pipeline applies
        # this permutation before the decoder and the inverse after, so the
        # segmentation comes back in the original XYZ layout for evaluation.
        spatial_transpose: [2, 1, 0]
        dust_merge: true
        dust_merge_size: 800
        dust_merge_affinity: 0.3
        dust_remove_size: 600
    postprocessing:
      enabled: true


# ============================================================================
# Parameter tuning for waterz agglomeration (--mode tune).
# Mirrors tutorials/neuron_snemi/neuron_snemi.yaml's tune block but with
# NISB validation data and NERL (skeleton metric) instead of adapted_rand.
# ============================================================================
tune:
  profile: tune_waterz
  n_trials: 25
  trial_timeout: 300
  study_name: nisb_base_banis_waterz_tuning
  load_if_exists: true
  data:
    val:
      path: /projects/weilab/dataset/nisb/base/train/
      image: seed0/data.zarr/img
      label: seed0/data.zarr/seg
      resolution: [9, 9, 20]
      skeleton: /projects/weilab/dataset/nisb/base/train/seed0/skeleton.pkl
  optimization:
    mode: single
    single_objective:
      metric: nerl
      direction: maximize
  parameter_space:
    decoding:
      function_name: decode_waterz
      defaults:
        thresholds: 0.5
        merge_function: aff85_his256
        aff_threshold: [0.1, 0.999]
        edge_offset: 0
        spatial_transpose: [2, 1, 0]
      parameters:
        merge_function:
          type: categorical
          choices: [aff85_his256, aff75_his256, aff50_his256, aff25_his256, aff15_his256]
          description: "Agglomeration scoring function (quantile via histogram)"
        thresholds:
          type: float
          range: [0.1, 0.9]
          step: 0.1
        aff_threshold_low:
          type: float
          range: [0, 0.5]
          step: 0.1
          param_group: aff_threshold
          tuple_index: 0
        aff_threshold_high:
          type: float
          range: [0.7, 1]
          step: 0.1
          param_group: aff_threshold
          tuple_index: 1
