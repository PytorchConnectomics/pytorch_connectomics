_base_:
  - 40nm_common.yaml

experiment_name: neuron_nisb_40nm_liconn_mednext_b_sdt
description: NISB Liconn neuron instance segmentation (BANIS-style) with MedNeXt-B, affinity + SDT (40nm)

default:
  model:
    arch:
      profile: mednext_b
  data:
    label_transform:
      targets:
      - name: affinity
        kwargs:
          long_range: 3
          affinity_mode: banis
      - name: skeleton_aware_edt
        kwargs:
          resolution: [36, 36, 24]
          alpha: 0.8
          bg_value: -1.0
          relabel: true

train:
  data:
    train:
      path: /projects/weilab/dataset/nisb/liconn/train
      label_aux_type: sdt
    val:
      path: /projects/weilab/dataset/nisb/liconn/val
      label_aux_type: sdt
  monitor:
    checkpoint:
      dirpath: outputs/neuron_nisb_40nm_liconn_mednext_b_sdt/checkpoints/

test:
  output_path: outputs/neuron_nisb_40nm_liconn_mednext_b_sdt/results_seed101/
  data:
    test:
      path: /projects/weilab/dataset/nisb/liconn/test/
      label_aux_type: sdt
