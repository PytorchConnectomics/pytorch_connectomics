_base_:
- ../../connectomics/config/all_profiles.yaml

experiment_name: nisb_base_banis
description: BANIS train_base_long reproduction target (9nm, 6-channel affinity, MedNeXt-S/k3, 128-cube,
  200k steps)

default:
  system:
    num_gpus: -1
    num_workers: -1
  model:
    arch:
      type: mednext
    input_size: [128, 128, 128]
    output_size: [128, 128, 128]
    in_channels: 1
    out_channels: 6
    loss:
      deep_supervision: false
      losses:
      - function: WeightedBCEWithLogitsLoss
        weight: 1.0
    mednext:
      size: S
      kernel_size: 3
      dim: 3d
      checkpoint_style: outside_block
  data:
    dataloader:
      profile: lazy
      patch_size: [128, 128, 128]
      # BANIS reads small_size + long_range on the trailing side, computes
      # affinities, then crops back to small_size. Canonical form is
      # [pre0, pre1, pre2, post0, post1, post2]; legacy length-3
      # [a, b, c] is treated as trailing-only.
      target_context: [0, 0, 0, 10, 10, 10]
      batch_size: 4
      use_cache: false
      use_preloaded_cache_train: false
      use_preloaded_cache_val: false
      val_random_sampling: true
    image_transform:
      normalize: "divide-255"
    # Match BANIS target semantics:
    # - 6 channels only: short-range + long-range@10
    # - source zarr is XYZ and stays XYZ, matching lib/banis
    # - decode_affinity_cc expects the first 3 channels in axis0, axis1, axis2 order
    label_transform:
      erosion: 0
      relabel_connected_components: true
      relabel_connectivity: 6
      targets:
      - name: affinity
        kwargs:
          offsets: ["1-0-0", "0-1-0", "0-0-1", "10-0-0", "0-10-0", "0-0-10"]
          affinity_mode: banis
    augmentation:
      profile: aug_banis
  inference:
    model:
      # Keep only short-range affinities. In XYZ mode the first three channels
      # already match decoder axis0, axis1, axis2 order.
      select_channel: [0, 1, 2]
      # Use float16 for the large value accumulator during lazy sliding-window
      # accumulation. Blending weights stay fp32; final storage is float16.
      output_dtype: float16
      channel_activations:
      - {channels: ":", activation: scale_sigmoid}
    execution:
      strategy: whole_volume
    window:
      # Single-GPU tutorial path. Distributed sliding-window sharding splits
      # windows across DDP ranks, but each rank still owns full-volume value and
      # weight accumulators before reducing to rank 0.
      distributed_sharding: false
      keep_input_on_cpu: true
      sw_device: cuda
      output_device: cpu
      # Match lib/banis patched_inference: 128^3 windows, 50% overlap,
      # snap-to-edge grid, and distance-transform blending.
      window_size: [128, 128, 128]
      sw_batch_size: 8
      overlap: 0.5
      blending: distance_transform
      # BANIS-style boundary handling: snap last window to image_size-roi_size
      # (no whole-volume padding). Honored by the lazy sliding-window path
      # (connectomics/inference/lazy.py).
      snap_to_edge: true
    save_results: true
    save_backend: h5
    test_time_augmentation:
      enabled: false

  decoding:
    enabled: true
    # Optional per-volume affinity mask: zeros out affinity channels at
    # masked-out voxels before decoding. Top-level DecodingConfig field —
    # not a decoder-step kwarg.
    affinity_mask_path: outputs/nisb_base_banis/20260427_095218/results_step=00200000/affinity_mask.h5
    steps:
    - name: decode_affinity_cc
      kwargs:
        threshold: 0.75
        #backend: cupy
        backend: numba
        # affinity_mode=banis stores edges at the source voxel.
        edge_offset: 0

  evaluation:
    enabled: true
    metrics: [nerl]

train:
  optimization:
    optimizer:
      name: AdamW
      lr: 0.001
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1.0e-8
    scheduler:
      name: CosineAnnealingLR
      interval: step
      frequency: 1
      min_lr: 0.0
      params:
        t_max: 200000
    max_epochs: 1000
    max_steps: 200000
    n_steps_per_epoch: 5000
    val_check_interval: 5000
    val_check_interval_unit: step
    # BANIS uses limit_val_batches=100 with batch_size=8.
    val_steps_per_epoch: 100
    gradient_clip_val: 1.0
    accumulate_grad_batches: 1
    precision: "16-mixed"
    log_every_n_steps: 100
    num_sanity_val_steps: 0
    ema:
      enabled: false
  data:
    train:
      path: /projects/weilab/dataset/nisb/base/train
      image: seed*/data.zarr/img
      label: seed*/data.zarr/seg
      resolution: [9, 9, 20]
    val:
      path: /projects/weilab/dataset/nisb/base/val
      image: seed100/data.zarr/img
      label: seed100/data.zarr/seg
      resolution: [9, 9, 20]
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, val_loss_total]
        loss_every_n_steps: 100
      images:
        max_images: 8
        num_slices: 2
        log_every_n_epochs: 1
        channel_mode: all
    checkpoint:
      monitor: val_loss_total
      mode: min
      save_top_k: 3
      save_every_n_steps: 50000
      save_on_train_epoch_end: false
      save_last: true
      checkpoint_filename: "{epoch:03d}-{val_loss_total:.4f}"
      save_path: outputs/nisb_base_banis

test:
  system:
    num_gpus: 1
  data:
    test:
      #path: /projects/weilab/dataset/nisb/base/train/seed0/
      #skeleton: /projects/weilab/dataset/nisb/base/train/seed0/skeleton.pkl
      path: /projects/weilab/dataset/nisb/base/test/seed101/
      skeleton: /projects/weilab/dataset/nisb/base/test/seed101/skeleton.pkl
      image: data.zarr/img
      label: data.zarr/seg
      resolution: [9, 9, 20]


# ============================================================================
# Parameter tuning for decode_affinity_cc threshold (--mode tune)
# ============================================================================
tune:
  data:
    val:
      path: /projects/weilab/dataset/nisb/base/train/
      image: seed0/data.zarr/img
      label: seed0/data.zarr/seg
      resolution: [9, 9, 20]
      skeleton: /projects/weilab/dataset/nisb/base/train/seed0/skeleton.pkl


  enabled: true
  n_trials: 4
  study_name: nisb_base_banis_cc_tuning
  load_if_exists: true

  sampler:
    name: TPE
    kwargs:
      n_startup_trials: 4

  optimization:
    mode: single
    single_objective:
      metric: nerl
      direction: maximize

  save_study: true

  logging:
    verbose: true
    show_progress_bar: true

  parameter_space:
    decoding:
      function_name: decode_affinity_cc
      defaults:
        backend: cupy
        edge_offset: 0
      parameters:
        threshold:
          type: float
          range: [0.7, 0.95]
          step: 0.05
          description: "Affinity binarization threshold for connected components"
