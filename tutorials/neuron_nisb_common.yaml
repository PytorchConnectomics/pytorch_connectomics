experiment_name: neuron_nisb_common_mednext_b_sdt
description: NISB neuron instance segmentation (BANIS-style) with MedNeXt-B, affinity + SDT (40nm)

_base_:
  - bases/all_profiles.yaml

default:
  model:
    arch:
      profile: mednext_b
    out_channels: 7
    loss:
      profile: loss_bd
    mednext:
      size: B
      kernel_size: 3
      dim: 3d
      checkpoint_style: outside_block
  data:
    # BANIS command mapping:
    # --base_data_path /projects/weilab/dataset/nisb
    # --data_setting base
    dataloader:
      profile: cached
      use_cache: false
    augmentation:
      profile: aug_light

  inference:
    system:
      num_gpus: 1
      num_workers: 4
    batch_size: 4
    sliding_window:
      keep_input_on_cpu: true
      sw_device: cuda
      output_device: cpu
    test_time_augmentation:
      enabled: false
      activation_profile: act_bd
      select_channel: [0, 1, 2, 6]
      ensemble_mode: mean
train:
  optimization:
    profile: warmup_cosine_lr
    max_epochs: 500
    n_steps_per_epoch: 200
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, val_loss_total, train_loss_affinity_total, train_loss_sdt_total]
        loss_every_n_steps: 100
        val_check_interval: 10.0
      images:
        enabled: true
        max_images: 8
        num_slices: 8
        log_every_n_epochs: 1
        channel_mode: all
    checkpoint:
      monitor: val_loss_total
      mode: min
      save_top_k: 3
test:
  inference:
    decoding:
      - name: decode_affinity_cc
        kwargs:
          threshold: 0.95
    evaluation:
      enabled: false
