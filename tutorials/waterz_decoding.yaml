experiment_name: waterz_decode_only
description: >
  Decode-only: load a pre-computed affinity HDF5 and run waterz decoding.
  No model, no inference, no TTA.

  Usage:
    python scripts/main.py --config tutorials/waterz_decoding.yaml --mode test \
      inference.saved_prediction_path=path/to/affinity.h5 \
      test.data.test.label=path/to/gt.h5

_base_:
  - ../connectomics/config/all_profiles.yaml

default:
  inference:
    saved_prediction_path: "/projects/weilab/dataset/liconn/mansour/DL288B_251222S_cond5_40x_12tiles_round1_fused_488_crop512x1024x1024_ffn_sharp_tta_x8_prediction_uint8.h5"   # SET THIS: path to affinity HDF5
    decoding:
      - template: decoding_waterz
        kwargs:
          use_aff_uint8: true
          use_seg_uint32: true
          thresholds: 0.4
          merge_function: affmean
          #merge_function: aff85_his256
          aff_threshold: [0, 1]
          channel_order: xyz
          boundary_threshold: 0.3
          dust_merge: true
          dust_merge_size: 400
          dust_merge_affinity: 0.3
          dust_remove_size: 200

test:
  data:
    test:
      resolution: [25, 18, 18]
