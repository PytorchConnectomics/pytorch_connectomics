experiment_name: rsunet_snemi_lee2017_modern
description: SNEMI3D neuron affinity learning (2017-style short-range setup with modern optimization and stability tricks)

_base_:
  - bases/all_profiles.yaml

default:
  pipeline_profile: affinity-12
  system:
    profile: all-gpu-cpu
  model:
    arch:
      profile: rsunet
    input_size: [16, 224, 224]
    output_size: [16, 224, 224]
  data:
    dataloader:
      profile: cached
      patch_size: [16, 224, 224]
    data_transform:
      # Keep symmetric full-volume context padding on the inference input.
      pad_size: [8, 128, 128]
    augmentation:
      profile: aug_em_neuron
  inference:
    sliding_window:
      window_size: [16, 224, 224]
      sw_batch_size: 1
      keep_input_on_cpu: false
    test_time_augmentation:
      #enabled: false
      enabled: true
      patch_first_local: true
      flip_axes: all
      rotation90_axes: [[1, 2]]
    postprocessing:
      enabled: true
      # Crop the padded prediction so the later DeepEM affinity crop lands back
      # on the original image support instead of shrinking the saved volume.
      crop_pad: [4, 8, 101, 128, 101, 128]
    save_prediction:
      enabled: true
    evaluation:
      enabled: true
      metrics: [adapted_rand]


train:
  data:
    train:
      image: datasets/SNEMI/train-input.tif
      label: datasets/SNEMI/train-labels.tif

  optimization:
    profile: warmup_cosine_lr
    max_epochs: 100
    n_steps_per_epoch: 1000    
  monitor:
    logging:
      scalar:
        loss_every_n_steps: 50
      images:
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
    checkpoint:
      save_top_k: 3
      monitor: train_loss_total_epoch      

test:
  data:
    test:
      path: datasets/SNEMI/
      # image: [train-input.tif, test-input_z29.h5]
      # label: [train-labels.tif, test-labels.h5]
      #image: train-input.tif
      #label: train-labels.tif
      #image: test-input_z29.h5
      image: test-input.tif
      label: test-labels.h5
      resolution: [30, 6, 6]
  inference:
    decoding:
    - profile: decoding_waterz
      kwargs:
        thresholds: 0.4
        merge_function: aff85_his256
        aff_threshold: [0.1, 0.999]
        dust_merge_size: 800
        dust_merge_affinity: 0.3
        dust_remove_size: 600
      
# ============================================================================
# Parameter tuning for waterz agglomeration thresholds (--mode tune)
# ============================================================================
tune:
  profile: tune_waterz
  n_trials: 25
  study_name: snemi_waterz_tuning
  data:
    val:
      image: datasets/SNEMI/test-input.tif
      label: datasets/SNEMI/test-labels.h5
      #image: datasets/SNEMI/train-input.tif
      #label: datasets/SNEMI/train-labels.tif
  # Override profile defaults for SNEMI-specific search ranges
  parameter_space:
    decoding:
      defaults:
        thresholds: 0.4
        merge_function: aff85_his256
        aff_threshold: [0.001, 0.999]
      parameters:
        merge_function:
          type: categorical
          choices: [aff85_his256, aff75_his256, aff50_his256]
          description: "Agglomeration scoring function (quantile via histogram)"
        thresholds:
          range: [0.1, 0.9]
          step: 0.1
        aff_threshold_low:
          range: [0.001, 0.5]
          step: 0.1
          param_group: aff_threshold
          tuple_index: 0
        aff_threshold_high:
          range: [0.7, 0.9999]
          step: 0.1
          param_group: aff_threshold
          tuple_index: 1
