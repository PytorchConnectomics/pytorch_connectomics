experiment_name: rsunet_snemi_lee2017_modern
description: SNEMI3D neuron affinity learning (2017-style short-range setup with modern optimization and stability tricks)

_base_:
  - bases/all_profiles.yaml

default:
  pipeline_profile: affinity-12
  system:
    profile: all-gpu-cpu
  model:
    arch:
      profile: rsunet
    input_size: [16, 224, 224]
    output_size: [16, 224, 224]
  data:
    dataloader:
      profile: cached
      patch_size: [16, 224, 224]
    data_transform:
      # Keep symmetric full-volume context padding on the inference input.
      pad_size: [8, 128, 128]
    augmentation:
      profile: aug_em_neuron
  inference:
    batch_size: 4    
    sliding_window:
      window_size: [16, 224, 224]
      sw_batch_size: 4
      keep_input_on_cpu: true
    test_time_augmentation:
      enabled: false
      flip_axes: all
      rotation90_axes: all
    postprocessing:
      enabled: true
      # Crop the padded prediction so the later DeepEM affinity crop lands back
      # on the original image support instead of shrinking the saved volume.
      crop_pad: [4, 8, 101, 128, 101, 128]
    save_prediction:
      enabled: true
    evaluation:
      enabled: true
      metrics: [adapted_rand]


train:
  data:
    train:
      image: datasets/SNEMI/train-input.tif
      label: datasets/SNEMI/train-labels.tif

  optimization:
    profile: warmup_cosine_lr
    max_epochs: 100
    n_steps_per_epoch: 1000    
  monitor:
    logging:
      scalar:
        loss_every_n_steps: 50
      images:
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
    checkpoint:
      save_top_k: 3
      monitor: train_loss_total_epoch      

test:
  data:
    test:
      path: datasets/SNEMI/
      # image: [train-input.tif, test-input_z29.h5]
      # label: [train-labels.tif, test-labels.h5]
      #image: train-input.tif
      #label: train-labels.tif
      image: test-input_z29.h5
      label: test-labels.h5
      resolution: [30, 6, 6]
  inference:
    decoding:
    - profile: decoding_abiss
      kwargs:
        cli_args:
          ws_size_threshold: 1300
          ws_dust_threshold: 900
          ws_high_threshold: 0.8
          ws_low_threshold: 0.01
          ws_merge_threshold: 0.3

# ============================================================================
# Parameter tuning for ABISS watershed thresholds (--mode tune)
# ============================================================================
tune:
  profile: tune_abiss
  n_trials: 25
  study_name: snemi_abiss_tuning
  data:
    val:
      image: datasets/SNEMI/train-input.tif
      label: datasets/SNEMI/train-labels.tif
  # Override profile defaults for SNEMI-specific search ranges
  parameter_space:
    decoding:
      defaults:
        cli_args:
          ws_high_threshold: 0.80
          ws_low_threshold: 0.01
          ws_size_threshold: 1300
          ws_dust_threshold: 900
          ws_merge_threshold: 0.30
      parameters:
        ws_high_threshold:
          range: [0.5, 0.9]
          step: 0.1
        ws_low_threshold:
          range: [0.01, 0.1]
          step: 0.01
        ws_merge_threshold:
          range: [0.1, 0.5]
          step: 0.1
        ws_size_threshold:
          range: [500, 2500]
          step: 100
        ws_dust_threshold:
          range: [300, 1500]
          step: 100
