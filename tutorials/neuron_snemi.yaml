experiment_name: rsunet_snemi_lee2017_modern
description: SNEMI3D neuron affinity learning (2017-style short-range setup with modern optimization and stability tricks)

_base_:
  - bases/all_profiles.yaml

default:
  pipeline_profile: affinity-12
  system:
    profile: all-gpu-cpu
  model:
    arch:
      profile: rsunet
    input_size: [16, 224, 224]
    output_size: [16, 224, 224]
  data:
    dataloader:
      profile: cached
      patch_size: [16, 224, 224]
    data_transform:
      # Keep symmetric full-volume context padding on the inference input.
      pad_size: [8, 128, 128]

  inference:
    # tta_result_path: outputs/neuron_snemi/20260305_195321/results/train-input_prediction_p1.h5
    batch_size: 4    
    sliding_window:
      window_size: [16, 224, 224]
      sw_batch_size: 4
    test_time_augmentation:
      enabled: true
      flip_axes: all
    postprocessing:
      enabled: true
      # Crop the padded prediction so the later DeepEM affinity crop lands back
      # on the original image support instead of shrinking the saved volume.
      crop_pad: [4, 8, 101, 128, 101, 128]
    save_prediction:
      enabled: true
    evaluation:
      enabled: true
      metrics: [adapted_rand]


train:
  data:
    train:
      image: datasets/SNEMI/train-input.tif
      label: datasets/SNEMI/train-labels.tif

  optimization:
    profile: warmup_cosine_lr
    max_epochs: 100
    n_steps_per_epoch: 1000    
  monitor:
    logging:
      scalar:
        loss_every_n_steps: 50
      images:
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
    checkpoint:
      save_top_k: 3
      monitor: train_loss_total_epoch      

test:
  data:
    test:
      path: datasets/SNEMI/
      # image: [train-input.tif, test-input_z29.h5]
      # label: [train-labels.tif, test-labels.h5]
      image: train-input.tif
      label: train-labels.tif
      resolution: [30, 6, 6]

# ============================================================================
# Parameter tuning for ABISS watershed thresholds (--mode tune)
# ============================================================================
tune:
  enabled: true
  n_trials: 50
  study_name: snemi_abiss_tuning
  load_if_exists: true

  sampler:
    name: TPE
    kwargs:
      n_startup_trials: 10

  optimization:
    mode: single
    single_objective:
      metric: adapted_rand
      direction: minimize

  # Tune data (use training volume which has ground truth)
  data:
    val:
      image: datasets/SNEMI/train-input.tif
      label: datasets/SNEMI/train-labels.tif

  output:
    save_study: true

  logging:
    verbose: true
    show_progress_bar: true

  parameter_space:
    decoding:
      function_name: decode_abiss
      defaults:
        command: "{python_exe} scripts/run_abiss_single.py --input {input_h5} --output {output_h5}"
        cli_args:
          ws_high_threshold: 0.80
          ws_low_threshold: 0.01
          ws_size_threshold: 800
          ws_dust_threshold: 600
          ws_merge_threshold: 0.20
      parameters:
        ws_high_threshold:
          type: float
          range: [0.5, 0.9]
          step: 0.1
          nest_under: cli_args
          description: "ABISS Tmax: high watershed threshold"
        ws_low_threshold:
          type: float
          range: [0.05, 0.2]
          step: 0.05
          nest_under: cli_args
          description: "ABISS Tmin: low watershed threshold"
        ws_merge_threshold:
          type: float
          range: [0.1, 0.5]
          step: 0.1
          nest_under: cli_args
          description: "ABISS Tmerge: affinity threshold for size-based merging"
        ws_size_threshold:
          type: int
          range: [100, 2000]
          step: 100
          nest_under: cli_args
          description: "ABISS Tsize: minimum segment size"
        ws_dust_threshold:
          type: int
          range: [100, 1500]
          step: 100
          nest_under: cli_args
          description: "ABISS Tdust: dust removal threshold"
