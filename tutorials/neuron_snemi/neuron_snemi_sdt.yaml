experiment_name: mednext_snemi_sdt
description: SNEMI3D neuron affinity + SDT learning (MedNeXt-S, 9-channel affinity + 1-channel SDT)

_base_:
  - ../connectomics/config/all_profiles.yaml

default:
  pipeline_profile: aff9_sdt
  system:
    profile: all-gpu-cpu
  model:
    arch:
      profile: mednext_s
    input_size: [32, 160, 160]
    output_size: [32, 160, 160]
  data:
    label_transform:
      resolution: [30, 6, 6]
      erosion: 1
      targets:
        - name: affinity
          kwargs:
            offsets: ["0-0-1", "0-1-0", "1-0-0", "0-0-5", "0-5-0", "5-0-0", "0-0-9", "0-9-0", "9-0-0"]
            affinity_mode: deepem
        - name: skeleton_aware_edt
          kwargs:
            alpha: 0.8
            bg_value: -1.0

    dataloader:
      profile: cached
      patch_size: [32, 160, 160]
    data_transform:
      # Keep symmetric full-volume context padding on the inference input.
      pad_size: [16, 80, 80]
    augmentation:
      profile: aug_em_neuron
  inference:
    sliding_window:
      window_size: [32, 160, 160]
      sw_batch_size: 1
      keep_input_on_cpu: false
    test_time_augmentation:
      enabled: false
      #enabled: true
      patch_first_local: true
      flip_axes: all
      rotation90_axes: [[1, 2]]
        #select_channel: [0, 1, 2, 9]
    # crop_pad + affinity_crop[(9,0),(9,0),(9,0)] = pad_size [16,80,80]
    crop_pad: [7, 16, 71, 80, 71, 80]
    postprocessing:
      enabled: true
    save_prediction:
      enabled: true

  decoding:
    - template: decoding_waterz
      kwargs:
        thresholds: 0.4
        merge_function: aff85_his256
        aff_threshold: [0.001, 0.999]

  evaluation:
    enabled: true
    metrics: [adapted_rand]


train:
  data:
    train:
      image: datasets/SNEMI/train-input.tif
      label: datasets/SNEMI/train-labels.tif
      label_aux: datasets/SNEMI/train-labels_skeleton.h5
      label_aux_type: skeleton

  optimization:
    profile: warmup_cosine_lr
    max_epochs: 200
    n_steps_per_epoch: 1000    
  monitor:
    logging:
      scalar:
        loss: [train_loss_total_epoch, train_loss_affinity_total, train_loss_sdt_total]
        loss_every_n_steps: 50
      images:
        log_every_n_epochs: 10
        max_images: 8
        num_slices: 2
        channel_mode: all
    checkpoint:
      save_top_k: 3
      monitor: train_loss_total_epoch
      mode: min

test:
  data:
    test:
      path: datasets/SNEMI/
      # image: [train-input.tif, test-input_z29.h5]
      # label: [train-labels.tif, test-labels.h5]
      #image: train-input.tif
      #label: train-labels.tif
      #image: test-input_z29.h5
      image: test-input.tif
      label: test-labels.h5
      resolution: [30, 6, 6]
      
# ============================================================================
# Parameter tuning for waterz agglomeration thresholds (--mode tune)
# ============================================================================
tune:
  profile: tune_waterz
  n_trials: 25
  study_name: snemi_waterz_tuning
  data:
    val:
      image: datasets/SNEMI/test-input.tif
      label: datasets/SNEMI/test-labels.h5
      #image: datasets/SNEMI/train-input.tif
      #label: datasets/SNEMI/train-labels.tif
  # Override profile defaults for SNEMI-specific search ranges
  parameter_space:
    decoding:
      defaults:
        thresholds: 0.4
        merge_function: aff85_his256
        aff_threshold: [0.001, 0.999]
      parameters:
        merge_function:
          type: categorical
          choices: [aff85_his256, aff75_his256, aff50_his256]
          description: "Agglomeration scoring function (quantile via histogram)"
        thresholds:
          range: [0.1, 0.9]
          step: 0.05
        aff_threshold_low:
          range: [0.001, 0.3]
          step: 0.01
          param_group: aff_threshold
          tuple_index: 0
        aff_threshold_high:
          range: [0.8, 0.9999]
          step: 0.01
          param_group: aff_threshold
          tuple_index: 1
