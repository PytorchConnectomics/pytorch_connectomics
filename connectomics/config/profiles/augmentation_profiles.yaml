# Augmentation Profile Library
#
# Usage:  data.augmentation.profile: aug_standard
#
# Profiles are organized by strength. Each is self-contained:
# pick ONE profile, then override individual fields as needed.
#
# Choosing a profile:
#   aug_light      — Fast training, clean data, fine-tuning
#   aug_standard   — Default for most 3D EM tasks (RECOMMENDED)
#   aug_strong     — Small datasets, overfitting prevention
#   aug_em_neuron  — Aggressive EM augmentation for neuron segmentation
#   aug_banis      — BANIS reproduction augmentation
#   aug_instance   — Instance segmentation (adds copy-paste + mixup)
#   aug_superres   — Super-resolution / multi-scale learning

augmentation_profiles:

  # ---------------------------------------------------------------------------
  # aug_light: Flip + rotate + mild intensity
  # ---------------------------------------------------------------------------
  # Use for: quick experiments, clean datasets, fine-tuning pretrained models.
  # Overhead: minimal. No EM artifact simulation.
  aug_light:

    flip:
      enabled: true
      prob: 0.5
    rotate:
      enabled: true
      prob: 0.5
      spatial_axes: [1, 2]
    intensity:
      enabled: true
      gaussian_noise_prob: 0.3
      gaussian_noise_std: 0.05
      shift_intensity_prob: 0.3
      shift_intensity_offset: 0.1
      contrast_prob: 0.3
      contrast_range: [0.9, 1.1]

  # ---------------------------------------------------------------------------
  # aug_standard: Light + EM artifact simulation
  # ---------------------------------------------------------------------------
  # Use for: most 3D EM segmentation tasks. Good balance of regularization
  # and training speed. Covers the augmentations used by ~80% of tutorials.
  aug_standard:

    flip:
      enabled: true
      prob: 0.5
    rotate:
      enabled: true
      prob: 0.5
      spatial_axes: [1, 2]
    intensity:
      enabled: true
      gaussian_noise_prob: 0.5
      gaussian_noise_std: 0.1
      shift_intensity_prob: 0.5
      shift_intensity_offset: 0.1
      contrast_prob: 0.5
      contrast_range: [0.9, 1.1]
    slice_shift_z:
      enabled: true
      prob: 0.4
      displacement: 10
      rotate_ratio: 0.0
    slice_drop_z:
      enabled: true
      prob: 0.3
      num_sections: 2

  # ---------------------------------------------------------------------------
  # aug_strong: Maximum regularization
  # ---------------------------------------------------------------------------
  # Use for: small datasets, severe overfitting, long training schedules.
  # Adds affine, elastic, motion blur, missing parts, and cut noise.
  # Increase max_epochs ~50% when using this profile.
  aug_strong:

    flip:
      enabled: true
      prob: 0.5
      spatial_axis: [0, 1, 2]
    rotate:
      enabled: true
      prob: 0.5
      spatial_axes: [1, 2]
    affine:
      enabled: true
      prob: 0.3
      rotate_range: [0.1, 0.1, 0.1]
      scale_range: [0.05, 0.05, 0.05]
      shear_range: [0.05, 0.05, 0.05]
    elastic:
      enabled: true
      prob: 0.3
      sigma_range: [5.0, 8.0]
      magnitude_range: [50.0, 150.0]
    intensity:
      enabled: true
      gaussian_noise_prob: 0.5
      gaussian_noise_std: 0.1
      shift_intensity_prob: 0.7
      shift_intensity_offset: 0.2
      contrast_prob: 0.7
      contrast_range: [0.7, 1.4]
    slice_shift_z:
      enabled: true
      prob: 0.5
      displacement: 16
      rotate_ratio: 0.3
    slice_drop_z:
      enabled: true
      prob: 0.4
      num_sections: 3
    motion_blur:
      enabled: true
      prob: 0.3
      sections: [1, 3]
      kernel_size: 11
    missing_parts:
      enabled: true
      prob: 0.2
      hole_range: [0.1, 0.25]
    cut_noise:
      enabled: true
      prob: 0.3
      length_ratio: [0.1, 0.25]
      noise_scale: [0.05, 0.15]

  # ---------------------------------------------------------------------------
  # aug_em_neuron: DeepEM-matched augmentation for neuron segmentation
  # ---------------------------------------------------------------------------
  # Use for: neuron affinity learning on anisotropic EM data (e.g. SNEMI3D).
  # Matches DeepEM (Lee et al. 2017) augmentation recipe:
  #   - Defect mutex: one selected imaging defect per sample
  #   - Elastic deformation (DeepEM Warp)
  #   - Aggressive ±50% contrast/brightness (DeepEM MixedGrayscale2D)
  # Tuned for small training volumes with long training schedules.
  aug_em_neuron:

    defect_mutex: true           # DeepEM Blend(mutex): one defect per sample
    flip:
      enabled: true
      prob: 0.5
    rotate:
      enabled: true
      prob: 0.5
    elastic:
      enabled: true
      prob: 0.7
      sigma_range: [4.0, 8.0]
      magnitude_range: [8.0, 16.0]
    intensity:
      enabled: true
      gaussian_noise_prob: 0.3
      gaussian_noise_std: 0.05
      shift_intensity_prob: 0.7
      shift_intensity_offset: 0.2
      contrast_prob: 0.7
      contrast_range: [0.5, 1.5]   # DeepEM ±50%
    slice_shift_z:
      enabled: true
      prob: 1.0                     # Always fires when selected by OneOf
      displacement: 17
      rotate_ratio: 0.0
    slice_drop_z:
      enabled: true
      prob: 1.0
      num_sections: [0, 5]
      full_section_prob: 0.5
      partial_ratio_range: [0.25, 0.75]
      fill_value_range: [0.0, 1.0]
    lost_section:
      enabled: true
      prob: 1.0
      num_sections: 1
      mode: random_neighbor
    motion_blur:
      enabled: true
      prob: 1.0
      sections: [0, 5]
      kernel_size: 11
      sigma_range: [1.0, 3.0]
      full_section_prob: 0.5
      partial_ratio_range: [0.25, 0.75]
    missing_parts:
      enabled: true
      prob: 0.2
      hole_range: [0.1, 0.25]

  # ---------------------------------------------------------------------------
  # aug_em_neuron_fast: Lighter DeepEM-style augmentation for faster loading
  # ---------------------------------------------------------------------------
  # Same overall intent as aug_em_neuron, but removes the most CPU-expensive
  # transforms (elastic deformation and motion blur) to improve dataloader
  # throughput while keeping defect simulation.
  aug_em_neuron_fast:

    defect_mutex: true
    flip:
      enabled: true
      prob: 0.5
    rotate:
      enabled: true
      prob: 0.5
    intensity:
      enabled: true
      gaussian_noise_prob: 0.3
      gaussian_noise_std: 0.05
      shift_intensity_prob: 0.7
      shift_intensity_offset: 0.2
      contrast_prob: 0.7
      contrast_range: [0.5, 1.5]
    slice_shift_z:
      enabled: true
      prob: 1.0
      displacement: 17
      rotate_ratio: 0.0
    slice_drop_z:
      enabled: true
      prob: 1.0
      num_sections: [0, 5]
      full_section_prob: 0.5
      partial_ratio_range: [0.25, 0.75]
      fill_value_range: [0.0, 1.0]
    lost_section:
      enabled: true
      prob: 1.0
      num_sections: 1
      mode: random_neighbor
    missing_parts:
      enabled: true
      prob: 0.2
      hole_range: [0.1, 0.25]

  # ---------------------------------------------------------------------------
  # aug_banis: BANIS train_base_long reproduction augmentation
  # ---------------------------------------------------------------------------
  # Matches BANIS defaults:
  #   drop_slice_prob=0.05, shift_slice_prob=0.05, intensity_aug=true,
  #   noise_scale=0.5, affine=0.5
  aug_banis:

    axis_permute:
      enabled: true
      prob: 1.0
    rotate90_all:
      enabled: true
      prob: 1.0
    flip:
      enabled: true
      prob: 0.5
      spatial_axis: [0, 1, 2]
    slice_drop:
      enabled: true
      prob: 0.5
      slice_prob: 0.05
      spatial_axis: [0, 1, 2]
      fill_value: 0.0
    slice_shift:
      enabled: true
      prob: 0.5
      slice_prob: 0.05
      shift_magnitude: 10
      spatial_axis: [0, 1, 2]
      wrap: true
    affine:
      enabled: true
      prob: 0.5
      rotate_range: [3.141592653589793, 3.141592653589793, 3.141592653589793]
      scale_range: [0.2, 0.2, 0.2]
      shear_range: [0.5, 0.5, 0.5]
    intensity:
      enabled: true
      banis_style: true
      mul_add_prob: 0.5
      mul_range: [0.9, 1.1]
      add_range: [-0.1, 0.1]
      gaussian_noise_prob: 0.5
      gaussian_noise_std: 0.5

  # ---------------------------------------------------------------------------
  # aug_banis2: aug_banis WITHOUT arbitrary rotation
  # ---------------------------------------------------------------------------
  # Identical to aug_banis except affine.rotate_range = 0: drops the arbitrary
  # interpolated rotation, whose resampling blurs/staircases thin instances and
  # adds cost. Discrete symmetries are still fully covered by axis_permute +
  # rotate90_all + flip. Keeps affine scale (+shear): scale resampling is fine
  # for the normalized [-1,1] precomputed SDT and teaches the model to decode
  # thin objects across scales.
  aug_banis2:

    axis_permute:
      enabled: true
      prob: 1.0
    rotate90_all:
      enabled: true
      prob: 1.0
    flip:
      enabled: true
      prob: 0.5
      spatial_axis: [0, 1, 2]
    slice_drop:
      enabled: true
      prob: 0.5
      slice_prob: 0.05
      spatial_axis: [0, 1, 2]
      fill_value: 0.0
    slice_shift:
      enabled: true
      prob: 0.5
      slice_prob: 0.05
      shift_magnitude: 10
      spatial_axis: [0, 1, 2]
      wrap: true
    affine:
      enabled: true
      prob: 0.5
      # Scale-only affine. No arbitrary rotation (covered exactly by axis_permute
      # + rotate90_all) and no shear: both interpolate and staircase thin
      # instances, and EM's real geometric distortion (section misalignment) is
      # already modeled by slice_shift/slice_drop. Scale is the one interpolated
      # transform we keep: +/-30% zoom to decode thin objects across scales
      # (empirically safe to 0.5x on the hole-filled GT; resamples fine for the
      # normalized [-1,1] SDT).
      rotate_range: [0.0, 0.0, 0.0]
      scale_range: [0.3, 0.3, 0.3]
      shear_range: [0.0, 0.0, 0.0]
    intensity:
      enabled: true
      banis_style: true
      mul_add_prob: 0.5
      mul_range: [0.9, 1.1]
      add_range: [-0.1, 0.1]
      gaussian_noise_prob: 0.5
      gaussian_noise_std: 0.5

  # ---------------------------------------------------------------------------
  # aug_instance: Standard + copy-paste + mixup
  # ---------------------------------------------------------------------------
  # Use for: instance segmentation (neuron, mitochondria, synapse).
  # Copy-paste creates synthetic training pairs; mixup regularizes small datasets.
  # Requires batch_size > 1 for mixup.
  aug_instance:

    flip:
      enabled: true
      prob: 0.5
    rotate:
      enabled: true
      prob: 0.5
      spatial_axes: [1, 2]
    intensity:
      enabled: true
      gaussian_noise_prob: 0.5
      gaussian_noise_std: 0.1
      shift_intensity_prob: 0.5
      shift_intensity_offset: 0.1
      contrast_prob: 0.5
      contrast_range: [0.9, 1.1]
    slice_shift_z:
      enabled: true
      prob: 0.4
      displacement: 16
      rotate_ratio: 0.5
    slice_drop_z:
      enabled: true
      prob: 0.3
      num_sections: 1
    copy_paste:
      enabled: true
      prob: 0.6
      max_obj_ratio: 0.7
      rotation_angles: [30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330]
      border: 3
    mixup:
      enabled: true
      prob: 0.3
      alpha_range: [0.7, 0.9]

  # ---------------------------------------------------------------------------
  # aug_superres: CutBlur-centric for multi-scale learning
  # ---------------------------------------------------------------------------
  # Use for: super-resolution, denoising, or tasks that benefit from
  # learning across resolution scales. CutBlur forces the model to handle
  # degraded (low-res) regions alongside high-res regions.
  aug_superres:

    flip:
      enabled: true
      prob: 0.5
    rotate:
      enabled: true
      prob: 0.5
      spatial_axes: [1, 2]
    intensity:
      enabled: true
      gaussian_noise_prob: 0.3
      gaussian_noise_std: 0.05
      shift_intensity_prob: 0.5
      shift_intensity_offset: 0.1
      contrast_prob: 0.3
      contrast_range: [0.9, 1.1]
    cut_blur:
      enabled: true
      prob: 0.8
      length_ratio: [0.3, 0.5]
      down_ratio_range: [2.0, 8.0]
      downsample_z: false
    motion_blur:
      enabled: true
      prob: 0.4
      sections: [1, 2]
      kernel_size: 7
