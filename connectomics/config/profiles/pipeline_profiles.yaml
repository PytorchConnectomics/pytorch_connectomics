pipeline_profiles:
  binary:
    model:
      out_channels: 1
      loss:
        profile: loss_binary
    inference:
      model:
        activation_profile: act_binary

  bcd:
    model:
      out_channels: 3
      loss:
        profile: loss_bcd
    data:
      label_transform:
        profile: label_bcd
    decoding:
      steps:
        - template: decoding_bcd
    inference:
      model:
        activation_profile: act_bcd
      test_time_augmentation:
        ensemble_mode: mean
  aff9:
    model:
      out_channels: 9
      loss:
        profile: loss_per_channel
    data:
      label_transform:
        profile: label_aff9
    decoding:
      steps:
        - template: decoding_waterz
    inference:
      model:
        activation_profile: act_binary
      test_time_augmentation:
        ensemble_mode: min
  aff12:
    model:
      out_channels: 12
      loss:
        profile: loss_per_channel
    data:
      label_transform:
        profile: label_aff12
    decoding:
      steps:
        - template: decoding_waterz
    inference:
      model:
        select_channel: [0, 1, 2]
        activation_profile: act_binary
      test_time_augmentation:
        ensemble_mode: min
  aff9_sdt:
    model:
      out_channels: 10
      loss:
        profile: loss_bd
    data:
      label_transform:
        profile: label_aff9_sdt
    decoding:
      steps:
        - template: decoding_waterz
    inference:
      model:
        activation_profile: act_bd
      test_time_augmentation:
        ensemble_mode: [["0:9", min], ["9:", mean]]
