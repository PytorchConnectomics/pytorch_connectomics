decoding_templates:
  decoding_bcd:
    steps:
      - name: decode_instance_binary_contour_distance
        kwargs:
          binary_threshold: [0.9, 0.85]
          contour_threshold: [0.8, 1.1]
          distance_threshold: [0.5, -0.5]
          min_instance_size: 30
          min_seed_size: 5
  decoding_waterz:
    steps:
      - name: decode_waterz
        kwargs:
          thresholds: 0.4
          merge_function: aff85_his256
          aff_threshold: [0.001, 0.999]
          channel_order: xyz
          # Run the entire waterz pipeline (watershed + agglomeration +
          # dust merge) in uint8 arithmetic. 4x less memory, lossless for
          # histogram-based scoring. Default off so float32 affinities stay
          # bit-exact with the legacy code path; set true for large volumes.
          use_aff_uint8: false
          dust_merge: true
          dust_merge_size: 100
          dust_merge_affinity: 0.0
          dust_remove_size: 50
  decoding_branch_merge:
    steps:
      - name: branch_merge
        kwargs:
          iou_threshold: 0.5
          singleton_size_ratio: 0.5
          best_buddy: true
          one_sided_threshold: 0.8
          one_sided_min_size: 100
          affinity_threshold: 0.0
          # Set true when this follows an affinity decoder step and should
          # receive the original prediction tensor as `affinities`.
          use_original_input: false
  decoding_branch_split:
    steps:
      - name: branch_split
        kwargs:
          seed_affinity_threshold: 0.75
          seed_backend: auto
          min_parent_size: 10000
          min_seed_size: 1000
          min_seed_fraction: 0.001
          max_seed_fraction: 0.75
          max_splits_per_parent: 8
          preserve_largest: true
          assignment: nearest
          # Set true when this follows an affinity decoder step and should
          # build split seeds from the original prediction tensor.
          use_original_input: false
  decoding_longrange_guided_split:
    steps:
      - name: longrange_guided_split
        kwargs:
          tag: lrgf
          guide_seg_path: ""
          guide_dataset: main
          candidate_mode: auto
          min_parent_voxels: 200000
          min_seed_voxels: 50000
          min_seed_axis_extent: 16
          min_seed_overlap_voxels: 5000
          min_seed_guide_fraction: 0.25
          min_seeds_in_parent: 2
          max_splits_per_parent: 8
          bbox_pad: [16, 16, 8]
          assignment: seeded_watershed
          new_label_start: auto
          report: true
  decoding_abiss:
    steps:
      - name: decode_abiss
        kwargs:
          command: "{python_exe} scripts/run_abiss_single.py --input {input_h5} --output {output_h5}"
          # Affinity thresholds accept absolute values (e.g. 0.80) or
          # percentiles (e.g. "80%") resolved from the data.
          cli_args:
            ws_high_threshold: 80%
            ws_low_threshold: 1%
            ws_size_threshold: 800
            ws_dust_threshold: 600
            ws_merge_threshold: 20%
